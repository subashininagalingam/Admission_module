{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}
    <title>Student Management System</title>
    {% endblock title %}
    <link rel="stylesheet" href="{% static 'admissions/css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    {% block extra_css %}
    {% endblock %}
</head>

<body>
    <nav class="navbar">
        <div class="logo">CSC_CRM</div>

        <ul class="nav-links" id="navLinks">
            <li><a href="{% url 'home' %}"><i class="fa-solid fa-house" id="home"></i></a></li>
            <li id="nav"><a href="{% url 'student' %}">Student Register</a></li>
            <li id="nav"><a href="{% url 'student_list' %}">Student List</a></li>
            <li id="nav"><a href="{% url 'search_students' %}">Search&Filter</a></li>
        </ul>

        <div class="menu-toggle" id="menuToggle">
            ☰
        </div>
    </nav>
    {% block content %}
    {% endblock content %}

    <script>
        const toggle = document.getElementById("menuToggle");
        const navLinks = document.getElementById("navLinks");

        toggle.addEventListener("click", () => {
            navLinks.style.display =
                navLinks.style.display === "flex" ? "none" : "flex";
        });
    </script>


</body>

</html>

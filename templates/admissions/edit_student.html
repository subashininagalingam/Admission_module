{% extends 'admissions/base.html' %}
{% load static %}
{% block title %}
<title>Edit Student</title>
{% endblock title %}

{% block extra_css %}
<link rel="stylesheet" type="text/css" href="{% static 'admissions/css/edit_student.css' %}">
{% endblock %}


{% block content %}

<h1>Edit Student</h1>

<form method="POST">
    {% csrf_token %}

    <label>Name: </label>
    <input type="text" name="First_name" value="{{ student.First_name }}" >
    <input type="text" name="Last_name" value="{{ student.Last_name }}"><br><br>

    <label>Mobile No:</label>
    <input type="text" name="phone_no" value="{{ student.phone_no }}" required><br><br>

    <label>Email:</label>
    <input type="email" name="email" value="{{ student.email }}" required><br><br>

    <label>Date of Birth:</label>
    <input type="date" name="dob" value="{{ student.dob|date:'Y-m-d' }}" required><br><br>

    <label>Address:</label>
    <textarea name="address" required>{{ student.address }}</textarea><br><br>

    <button type="submit">Update</button>
</form>
{% endblock content %}
